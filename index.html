<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CatSwipe — Find Your Purrfect Cat</title>
    <meta name="description"
        content="Swipe right to like, swipe left to pass. Discover what kind of cats you love with CatSwipe!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        /* ───────────────────────────────────────────
       RESET & CSS VARIABLES
    ─────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d14;
            --surface: #16162a;
            --card-bg: #1e1e35;
            --accent-pink: #f472b6;
            --accent-purple: #a855f7;
            --accent-blue: #60a5fa;
            --like-green: #4ade80;
            --nope-red: #f87171;
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --radius: 20px;
            --card-w: min(360px, 92vw);
            --card-ratio: 1.38;
            --shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            touch-action: none;
        }

        /* ───────────────────────────────────────────
       BACKGROUND
    ─────────────────────────────────────────── */
        .bg-blob {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-blob::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.18) 0%, transparent 70%);
            top: -120px;
            left: -120px;
        }

        .bg-blob::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.14) 0%, transparent 70%);
            bottom: -180px;
            right: -150px;
        }

        /* ───────────────────────────────────────────
       SCREENS
    ─────────────────────────────────────────── */
        .screen {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s, transform 0.4s;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.97);
        }

        /* ───────────────────────────────────────────
       LOADING SCREEN
    ─────────────────────────────────────────── */
        #screen-loading {
            gap: 24px;
        }

        .loading-icon {
            font-size: 4rem;
            animation: bounce 1s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0) scale(1);
            }

            to {
                transform: translateY(-14px) scale(1.1);
            }
        }

        .loading-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-sub {
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .progress-bar-wrap {
            width: 240px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            border-radius: 99px;
            transition: width 0.3s ease;
        }

        /* ───────────────────────────────────────────
       SWIPE SCREEN
    ─────────────────────────────────────────── */
        #screen-swipe {
            justify-content: flex-start;
            padding-top: env(safe-area-inset-top, 0px);
        }

        /* Header / stats */
        .header {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 4px 12px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            padding: 5px 12px;
            font-size: 0.82rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }

        .stat-chip span {
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Progress dots */
        .progress-dots {
            display: flex;
            gap: 5px;
            align-items: center;
            width: 100%;
            max-width: 420px;
            flex-wrap: wrap;
            padding: 0 4px 10px;
            flex-shrink: 0;
        }

        .dot {
            flex: 1;
            height: 3px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.12);
            transition: background 0.3s;
        }

        .dot.liked {
            background: var(--like-green);
        }

        .dot.disliked {
            background: var(--nope-red);
        }

        .dot.current {
            background: var(--accent-purple);
        }

        /* Card stack */
        .card-stack {
            position: relative;
            width: var(--card-w);
            height: calc(var(--card-w) * var(--card-ratio));
            flex-shrink: 0;
        }

        .cat-card {
            position: absolute;
            inset: 0;
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: grab;
            user-select: none;
            transition: transform 0.15s ease, filter 0.3s, opacity 0.3s;
            touch-action: none;
        }

        .cat-card:active {
            cursor: grabbing;
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            border-radius: var(--radius);
        }

        /* Skeleton shimmer */
        .cat-card.loading img {
            opacity: 0;
        }

        .cat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        .cat-card:not(.loading)::before {
            display: none;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        /* Like / Nope badges */
        .badge {
            position: absolute;
            top: 28px;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.1s;
            border: 3px solid;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .badge-like {
            left: 20px;
            color: var(--like-green);
            border-color: var(--like-green);
            background: rgba(74, 222, 128, 0.12);
            transform: rotate(-10deg);
        }

        .badge-nope {
            right: 20px;
            color: var(--nope-red);
            border-color: var(--nope-red);
            background: rgba(248, 113, 113, 0.12);
            transform: rotate(10deg);
        }

        /* Card number tag */
        .card-tag {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(13, 13, 20, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 10px 14px;
            pointer-events: none;
        }

        .card-num {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .card-tags {
            font-size: 0.88rem;
            font-weight: 600;
            margin-top: 2px;
            color: var(--text);
        }

        /* Stack visual: cards behind */
        .cat-card.behind-1 {
            transform: scale(0.95) translateY(12px);
            filter: brightness(0.7);
            z-index: 0;
        }

        .cat-card.behind-2 {
            transform: scale(0.90) translateY(22px);
            filter: brightness(0.5);
            z-index: -1;
        }

        .cat-card.top {
            z-index: 10;
        }

        .cat-card.behind-1 {
            z-index: 5;
        }

        .cat-card.behind-2 {
            z-index: 2;
        }

        /* Swipe-out animations */
        .swipe-right {
            animation: swipeRight 0.38s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .swipe-left {
            animation: swipeLeft 0.38s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes swipeRight {
            to {
                transform: translateX(140%) rotate(18deg);
                opacity: 0;
            }
        }

        @keyframes swipeLeft {
            to {
                transform: translateX(-140%) rotate(-18deg);
                opacity: 0;
            }
        }

        /* Action buttons */
        .action-row {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            flex-shrink: 0;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.15s, box-shadow 0.15s;
            font-size: 1.5rem;
        }

        .btn-action:active {
            transform: scale(0.9);
        }

        .btn-nope {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f87171, #dc2626);
            box-shadow: 0 8px 24px rgba(248, 113, 113, 0.4);
        }

        .btn-like {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #4ade80, #16a34a);
            box-shadow: 0 8px 24px rgba(74, 222, 128, 0.4);
        }

        .btn-undo {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            font-size: 1.2rem;
        }

        .btn-action:hover {
            transform: scale(1.1);
        }

        /* Side hints */
        .side-hint {
            position: fixed;
            top: 50%;
            font-size: 1.8rem;
            opacity: 0.15;
            pointer-events: none;
            transform: translateY(-50%);
        }

        .hint-left {
            left: 8px;
        }

        .hint-right {
            right: 8px;
        }

        /* ───────────────────────────────────────────
       SUMMARY SCREEN
    ─────────────────────────────────────────── */
        #screen-summary {
            overflow-y: auto;
            justify-content: flex-start;
            padding: 24px 16px 40px;
            gap: 0;
        }

        .summary-header {
            text-align: center;
            margin-bottom: 28px;
            margin-top: 8px;
        }

        .summary-emoji {
            font-size: 3.5rem;
        }

        .summary-title {
            font-size: 1.9rem;
            font-weight: 800;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary-sub {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            margin: 0 auto 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
        }

        .stat-card .num {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .stat-card .lbl {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .stat-card.liked .num {
            color: var(--like-green);
        }

        .stat-card.noped .num {
            color: var(--nope-red);
        }

        .stat-card.total .num {
            color: var(--accent-purple);
        }

        .liked-section {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .liked-section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 480px) {
            .gallery {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .gallery-thumb {
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            background: var(--card-bg);
        }

        .gallery-thumb:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
        }

        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .no-likes {
            text-align: center;
            padding: 32px;
            color: var(--text-dim);
            font-size: 1rem;
        }

        .btn-restart {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 28px auto 0;
            padding: 16px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: #fff;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(168, 85, 247, 0.5);
        }

        .btn-restart:active {
            transform: translateY(0) scale(0.98);
        }

        /* ───────────────────────────────────────────
       LIGHTBOX
    ─────────────────────────────────────────── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 18px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        }

        #lightbox .lb-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #lightbox .lb-close:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        /* ───────────────────────────────────────────
       KEYBOARD HINT
    ─────────────────────────────────────────── */
        .keyboard-hint {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.22);
            pointer-events: none;
            white-space: nowrap;
        }

        @media (hover: none) {
            .keyboard-hint {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- Background gradient blobs -->
    <div class="bg-blob"></div>

    <!-- ─────────────────────────────────────────
     LOADING SCREEN
───────────────────────────────────────── -->
    <section id="screen-loading" class="screen" aria-label="Loading cats">
        <div class="loading-icon">🐱</div>
        <h1 class="loading-title">CatSwipe</h1>
        <p class="loading-sub">Fetching your furry friendss…</p>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="load-bar"></div>
        </div>
    </section>

    <!-- ─────────────────────────────────────────
     SWIPE SCREEN
───────────────────────────────────────── -->
    <section id="screen-swipe" class="screen hidden" aria-label="Swipe cats">

        <header class="header" aria-label="App header">
            <div class="brand">😻 CatSwipe</div>
            <div class="stats-row">
                <div class="stat-chip">❤️ <span id="hdr-likes">0</span></div>
                <div class="stat-chip">🐾 <span id="hdr-total">0</span></div>
            </div>
        </header>

        <div class="progress-dots" id="progress-dots" aria-label="Progress"></div>

        <div class="card-stack" id="card-stack" aria-label="Cat card stack">
            <!-- Cards injected by JS -->
        </div>

        <div class="action-row" aria-label="Action buttons">
            <button class="btn-action btn-undo" id="btn-undo" title="Undo (↑)" aria-label="Undo">↩️</button>
            <button class="btn-action btn-nope" id="btn-nope" title="Dislike (←)" aria-label="Dislike">✖️</button>
            <button class="btn-action btn-like" id="btn-like" title="Like (→)" aria-label="Like">💚</button>
        </div>

        <div class="side-hint hint-left" aria-hidden="true">👈</div>
        <div class="side-hint hint-right" aria-hidden="true">👉</div>
    </section>

    <!-- ─────────────────────────────────────────
     SUMMARY SCREEN
───────────────────────────────────────── -->
    <section id="screen-summary" class="screen hidden" aria-label="Results summary">
        <div class="summary-header">
            <div class="summary-emoji" id="summary-emoji">🎊</div>
            <h1 class="summary-title" id="summary-title">Your Cat Report!</h1>
            <p class="summary-sub" id="summary-sub">Here's what you thought of your feline lineup.</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="num" id="stat-total">0</div>
                <div class="lbl">Reviewed</div>
            </div>
            <div class="stat-card liked">
                <div class="num" id="stat-likes">0</div>
                <div class="lbl">Liked</div>
            </div>
            <div class="stat-card noped">
                <div class="num" id="stat-nopes">0</div>
                <div class="lbl">Passed</div>
            </div>
        </div>
        <div class="liked-section">
            <div class="liked-section-title" id="liked-section-title">Cats You Liked ❤️</div>
            <div class="gallery" id="gallery"></div>
            <div class="no-likes hidden" id="no-likes">😿 No likes yet — try another round!</div>
        </div>
        <button class="btn-restart" id="btn-restart">🔄 Swipe Again</button>
    </section>

    <!-- ─────────────────────────────────────────
     LIGHTBOX
───────────────────────────────────────── -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Full size cat">
        <img id="lb-img" src="" alt="Full size cat" />
        <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
    </div>

    <!-- Keyboard hint -->
    <div class="keyboard-hint" aria-hidden="true">← Nope &nbsp;|&nbsp; → Like &nbsp;|&nbsp; ↑ Undo</div>

    <!-- ─────────────────────────────────────────
     APPLICATION SCRIPT
───────────────────────────────────────── -->
    <script>
        'use strict';

        /* ─── CONFIG ────────────────────────────── */
        const TOTAL_CATS = 15;
        const SWIPE_THRESH = 80;   // px to confirm swipe
        const CATAAS_BASE = 'https://cataas.com';

        /* ─── STATE ─────────────────────────────── */
        let cats = [];   // [{id, url, tags}]
        let history = [];   // Array of 'like'|'nope' decisions for undo
        let current = 0;    // index into cats[]
        let likes = 0;
        let dragState = null; // active drag info

        /* ─── DOM REFS ──────────────────────────── */
        const $ = id => document.getElementById(id);
        const screenLoading = $('screen-loading');
        const screenSwipe = $('screen-swipe');
        const screenSummary = $('screen-summary');
        const loadBar = $('load-bar');
        const cardStack = $('card-stack');
        const dotsWrap = $('progress-dots');
        const hdrLikes = $('hdr-likes');
        const hdrTotal = $('hdr-total');
        const btnLike = $('btn-like');
        const btnNope = $('btn-nope');
        const btnUndo = $('btn-undo');
        const btnRestart = $('btn-restart');
        const lightbox = $('lightbox');
        const lbImg = $('lb-img');
        const lbClose = $('lb-close');

        /* ─── UTILITIES ─────────────────────────── */
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        function showScreen(el) {
            [screenLoading, screenSwipe, screenSummary].forEach(s => {
                s.classList.toggle('hidden', s !== el);
            });
        }

        /* ─── LOAD CATS ─────────────────────────── */
        async function loadCats() {
            try {
                const skip = Math.floor(Math.random() * 200);
                const res = await fetch(`${CATAAS_BASE}/api/cats?limit=${TOTAL_CATS + 5}&skip=${skip}`);
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                const selection = shuffle(data).slice(0, TOTAL_CATS);
                return selection.map(c => ({
                    id: c._id || c.id,
                    url: `${CATAAS_BASE}/cat/${c._id || c.id}`,
                    tags: (c.tags && c.tags.length) ? c.tags.join(', ') : ''
                }));
            } catch {
                // Fallback: random cat URLs with cache-busting
                return Array.from({ length: TOTAL_CATS }, (_, i) => ({
                    id: `fallback-${i}`,
                    url: `${CATAAS_BASE}/cat?${Date.now()}-${i}`,
                    tags: ''
                }));
            }
        }

        async function preloadImages(data, onProgress) {
            let done = 0;
            await Promise.allSettled(data.map(cat => new Promise(resolve => {
                const img = new Image();
                const timeout = setTimeout(resolve, 5000);
                img.onload = img.onerror = () => { clearTimeout(timeout); done++; onProgress(done / data.length); resolve(); };
                img.src = cat.url;
            })));
        }

        /* ─── PROGRESS DOTS ─────────────────────── */
        function renderDots() {
            dotsWrap.innerHTML = '';
            cats.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = 'dot';
                if (i < current) {
                    d.classList.add(history[i] === 'like' ? 'liked' : 'disliked');
                } else if (i === current) {
                    d.classList.add('current');
                }
                dotsWrap.appendChild(d);
            });
        }

        /* ─── CARD STACK RENDERING ──────────────── */
        function getTopCard() {
            return cardStack.querySelector('.cat-card.top');
        }

        function renderStack() {
            // Remove old cards
            cardStack.innerHTML = '';

            // Show up to 3 cards
            for (let offset = 2; offset >= 0; offset--) {
                const idx = current + offset;
                if (idx >= cats.length) continue;
                const cat = cats[idx];
                const card = document.createElement('div');
                card.className = `cat-card${offset === 0 ? ' top' : offset === 1 ? ' behind-1' : ' behind-2'}`;
                card.dataset.idx = idx;

                const img = document.createElement('img');
                img.src = cat.url;
                img.alt = `Cat ${idx + 1}`;
                img.draggable = false;
                card.appendChild(img);

                if (offset === 0) {
                    // Badges on top card only
                    const likeB = document.createElement('div');
                    likeB.className = 'badge badge-like'; likeB.textContent = 'LIKE';
                    const nopeB = document.createElement('div');
                    nopeB.className = 'badge badge-nope'; nopeB.textContent = 'NOPE';
                    card.appendChild(likeB);
                    card.appendChild(nopeB);

                    // Info tag
                    const tag = document.createElement('div');
                    tag.className = 'card-tag';
                    tag.innerHTML = `
        <div class="card-num">Cat ${idx + 1} of ${cats.length}</div>
        ${cat.tags ? `<div class="card-tags">#${cat.tags.split(', ').join(' #')}</div>` : ''}
      `;
                    card.appendChild(tag);

                    // Attach drag/swipe listeners
                    attachDrag(card);
                }

                cardStack.appendChild(card);
            }
            renderDots();
            hdrTotal.textContent = current;
            hdrLikes.textContent = likes;
        }

        /* ─── DECIDING ──────────────────────────── */
        function decide(direction) {
            if (current >= cats.length) return;
            const topCard = getTopCard();
            if (!topCard) return;

            const isLike = direction === 'like';
            history.push(direction);
            if (isLike) likes++;
            current++;

            // Animate out
            topCard.style.transition = 'none'; // remove transition for clean animation start
            topCard.classList.add(isLike ? 'swipe-right' : 'swipe-left');
            topCard.style.pointerEvents = 'none';

            topCard.addEventListener('animationend', () => {
                topCard.remove();
                if (current >= cats.length) {
                    showSummary();
                } else {
                    renderStack();
                }
            }, { once: true });

            // Optimistically update stats
            hdrLikes.textContent = likes;
            hdrTotal.textContent = current;
        }

        /* ─── UNDO ──────────────────────────────── */
        function undo() {
            if (current === 0) return;
            const last = history.pop();
            if (last === 'like') likes--;
            current--;
            renderStack();
        }

        /* ─── DRAG / SWIPE ──────────────────────── */
        function attachDrag(card) {
            card.addEventListener('pointerdown', onDragStart, { passive: false });
        }

        function onDragStart(e) {
            if (e.button && e.button !== 0) return;
            e.preventDefault();
            const card = e.currentTarget;
            card.setPointerCapture(e.pointerId);
            dragState = {
                card,
                startX: e.clientX || e.touches?.[0]?.clientX || 0,
                startY: e.clientY || e.touches?.[0]?.clientY || 0,
            };
            card.style.transition = 'none';
            card.addEventListener('pointermove', onDragMove);
            card.addEventListener('pointerup', onDragEnd);
            card.addEventListener('pointercancel', onDragEnd);
        }

        function onDragMove(e) {
            if (!dragState) return;
            const dx = e.clientX - dragState.startX;
            const dy = e.clientY - dragState.startY;
            const rot = dx * 0.06;

            dragState.lastDx = dx; // persist for use in onDragEnd (pointerup clientX can be 0 on touch)
            dragState.card.style.transform = `translateX(${dx}px) translateY(${dy * 0.3}px) rotate(${rot}deg)`;

            // Badge opacity
            const likeB = dragState.card.querySelector('.badge-like');
            const nopeB = dragState.card.querySelector('.badge-nope');
            const ratio = Math.min(Math.abs(dx) / SWIPE_THRESH, 1);
            if (dx > 0) {
                likeB.style.opacity = ratio;
                nopeB.style.opacity = 0;
            } else {
                nopeB.style.opacity = ratio;
                likeB.style.opacity = 0;
            }
        }

        function onDragEnd(e) {
            if (!dragState) return;
            // Prefer lastDx tracked in onDragMove — pointerup's clientX can be 0 on touch
            const dx = dragState.lastDx ?? (e.clientX - dragState.startX);
            const card = dragState.card;
            dragState = null;
            card.removeEventListener('pointermove', onDragMove);
            card.removeEventListener('pointerup', onDragEnd);
            card.removeEventListener('pointercancel', onDragEnd);

            if (dx > SWIPE_THRESH) {
                decide('like');
            } else if (dx < -SWIPE_THRESH) {
                decide('nope');
            } else {
                // Snap back
                card.style.transition = 'transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
                card.style.transform = '';
                card.querySelectorAll('.badge').forEach(b => b.style.opacity = 0);
            }
        }

        /* ─── SUMMARY ───────────────────────────── */
        function showSummary() {
            const total = cats.length;
            const nopes = total - likes;

            $('stat-total').textContent = total;
            $('stat-likes').textContent = likes;
            $('stat-nopes').textContent = nopes;

            const ratio = likes / total;
            let emoji, title, sub;
            if (likes === 0) { emoji = '😿'; title = "No Cats Today?"; sub = "Perhaps another round will win you over!"; }
            else if (ratio === 1) { emoji = '😻'; title = "Cat Lover Supreme!"; sub = "You liked every single feline — no surprises there!"; }
            else if (ratio >= 0.7) { emoji = '🐱'; title = "Totally a Cat Person!"; sub = "You have great taste in cats."; }
            else if (ratio >= 0.4) { emoji = '😺'; title = "Picky But Loving!"; sub = "Quality over quantity — you know what you like."; }
            else { emoji = '🙀'; title = "Tough Crowd!"; sub = "Only a select few caught your eye today."; }

            $('summary-emoji').textContent = emoji;
            $('summary-title').textContent = title;
            $('summary-sub').textContent = sub;

            const gallery = $('gallery');
            gallery.innerHTML = '';
            const likedCats = cats.filter((_, i) => history[i] === 'like');

            if (likedCats.length === 0) {
                $('no-likes').classList.remove('hidden');
                $('liked-section-title').textContent = '';
            } else {
                $('no-likes').classList.add('hidden');
                $('liked-section-title').textContent = `Cats You Liked ❤️ (${likedCats.length})`;
                likedCats.forEach(cat => {
                    const thumb = document.createElement('div');
                    thumb.className = 'gallery-thumb';
                    const img = document.createElement('img');
                    img.src = cat.url;
                    img.alt = 'Liked cat';
                    thumb.appendChild(img);
                    thumb.addEventListener('click', () => openLightbox(cat.url));
                    gallery.appendChild(thumb);
                });
            }

            showScreen(screenSummary);
        }

        /* ─── LIGHTBOX ──────────────────────────── */
        function openLightbox(src) {
            lbImg.src = src;
            lightbox.classList.add('active');
        }
        function closeLightbox() {
            lightbox.classList.remove('active');
            lbImg.src = '';
        }
        lbClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

        /* ─── KEYBOARD ──────────────────────────── */
        document.addEventListener('keydown', e => {
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                return;
            }
            if (!screenSwipe.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') decide('nope');
                if (e.key === 'ArrowLeft') decide('like');
                if (e.key === 'ArrowUp') undo();
            }
        });

        /* ─── BUTTON BINDINGS ───────────────────── */
        btnLike.addEventListener('click', () => decide('like'));
        btnNope.addEventListener('click', () => decide('nope'));
        btnUndo.addEventListener('click', undo);
        btnRestart.addEventListener('click', init);

        /* ─── INIT ──────────────────────────────── */
        async function init() {
            // Reset state
            cats = []; history = []; current = 0; likes = 0;
            cardStack.innerHTML = '';
            hdrLikes.textContent = '0';
            hdrTotal.textContent = '0';
            loadBar.style.width = '0%';

            showScreen(screenLoading);

            // Fetch and preload
            cats = await loadCats();
            await preloadImages(cats, p => {
                loadBar.style.width = `${Math.round(p * 100)}%`;
            });

            renderStack();
            showScreen(screenSwipe);
        }

        // Kick off!
        init();
    </script>
</body>

</html>
